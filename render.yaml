services:
  # Backend — FastAPI
  - type: web
    name: oncodetect-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: FRONTEND_URL
        value: https://oncodetect.onrender.com
    plan: free

  # Frontend — React Static
  - type: web
    name: oncodetect
    runtime: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: VITE_API_URL
        value: https://oncodetect-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
